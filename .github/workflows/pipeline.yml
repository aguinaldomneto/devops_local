name: CI/CD Local

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Gerar versão
        id: version
        run: echo "VERSION=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build Docker
        run: docker build -t devops-app:${{ steps.version.outputs.VERSION }} .

      - name: Atualizar Deployment
        run: |
          kubectl set image deployment/devops-app \
          app=devops-app:${{ steps.version.outputs.VERSION }}
