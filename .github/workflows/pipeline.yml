name: CI/CD Local

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build Docker
        run: docker build -t devops-app:latest .

      - name: Atualizar Kubernetes
        run: |
          kubectl apply -f k8s/
          kubectl rollout restart deployment devops-app
